version: "1"

sources:
  kafka:
    paths:
      - "schemas/avro/**/*.avsc"
    baseline: branch:main

  rest:
    paths:
      - "api/openapi/**/*.yaml"
    baseline: branch:main

  database:
    paths:
      - "src/main/resources/db/changelog/**/*.xml"
    baseline: branch:main

rules:
  kafka:
    compatibility: BACKWARD
    # n-version-compatibility: 2 checks new schema against last 2 committed versions
    # enabling it prevents changes that break consumers still on N-2
    n-version-compatibility: 2

  rest:
    n-version-compatibility: 2
    breaking:
      - endpoint-removed
      - required-param-added
      - response-field-removed
      - response-field-type-changed
      - status-code-removed
    warning:
      - response-field-deprecated
      - parameter-renamed
    ignore:
      - "/actuator/**"

  database:
    breaking:
      - column-removed
      - table-removed
      - not-null-added-no-default
      - column-type-changed
    warning:
      - column-renamed
      - migration-modified

gate:
  block-on: breaking
