name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build and test
        run: mvn verify --batch-mode --no-transfer-progress

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: target/surefire-reports/

  contract-guardian:
    name: Contract Guardian Gate
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # required — full history needed for baseline comparison

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Cache Contract Guardian build
        uses: actions/cache@v4
        with:
          path: /tmp/cg/.m2
          key: contract-guardian-${{ hashFiles('/tmp/cg/pom.xml') }}
          restore-keys: contract-guardian-

      - name: Build Contract Guardian
        run: |
          git clone --branch nminus-compatibility \
            https://github.com/vyndra-io/contract-guardian.git /tmp/cg
          cd /tmp/cg && mvn package -DskipTests -q \
            -Dmaven.repo.local=/tmp/cg/.m2

      - name: Run contract guardian gate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          java -jar /tmp/cg/contract-guardian-cli/target/contract-guardian-cli-*.jar \
            scan \
            --diff origin/${{ github.base_ref }}..HEAD \
            --reporter terminal \
            --reporter junit:contract-guardian-report.xml \
            --github-pr ${{ github.repository }}#${{ github.event.pull_request.number }}

      - name: Upload contract guardian report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contract-guardian-report
          path: contract-guardian-report.xml

  publish:
    name: Publish Artifact
    runs-on: ubuntu-latest
    needs: [build, contract-guardian]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build production artifact
        run: mvn package -DskipTests --batch-mode --no-transfer-progress

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: order-service-jar
          path: target/order-service-*.jar
          retention-days: 30
